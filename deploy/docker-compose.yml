services:
  app:
    image: ghcr.io/ronzz-org/ronzz-org:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://ronzz:${POSTGRES_PASSWORD}@db:5432/ronzz
      - ORIGIN=https://ronzz.org
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ronzz-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ronzz
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ronzz
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ronzz -d ronzz"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ronzz-net

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - ronzz-net

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  ronzz-net:
    driver: bridge

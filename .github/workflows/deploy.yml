name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ronzz-org/ronzz-org

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ORIGIN=https://ronzz.org
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,REGISTRY,GITHUB_ACTOR
          script: |
            cd /opt/ronzz-org
            echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin
            # Pull new image
            docker compose pull
            # Tag current as rollback target
            ROLLBACK_TAG="rollback-$(date -u +'%s')"
            docker tag "$REGISTRY/$IMAGE_NAME:latest" "$REGISTRY/$IMAGE_NAME:$ROLLBACK_TAG" 2>/dev/null || true
            # Deploy new containers
            docker compose up -d --wait --wait-timeout 60
            # Health check: verify app responds within timeout
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}s"
                break
              fi
              echo "Waiting for app... (${i}/12)"
              sleep 5
            done
            # Verify health (last attempt)
            if ! curl -sf http://localhost:3000/api/v1/health > /dev/null 2>&1; then
              echo "Health check FAILED — rolling back..."
              docker tag "$REGISTRY/$IMAGE_NAME:$ROLLBACK_TAG" "$REGISTRY/$IMAGE_NAME:latest"
              docker compose up -d --wait --wait-timeout 60
              echo "Rollback to $ROLLBACK_TAG complete"
              exit 1
            fi
            # Clean up old rollback tags (keep last 3)
            docker images "$REGISTRY/$IMAGE_NAME" --format "{{.Tag}}" | grep "^rollback-" | sort | head -n -3 | xargs -r docker rmi 2>/dev/null || true
            echo "Deployment complete: ${{ github.sha }}"

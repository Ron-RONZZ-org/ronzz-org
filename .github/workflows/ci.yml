name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: pnpm audit
        run: pnpm audit

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ronzz/web exec svelte-kit sync
      - run: pnpm --filter @ronzz/web exec svelte-check --tsconfig ./tsconfig.json

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db: [sqlite, pg]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Test with SQLite
        if: matrix.db == 'sqlite'
        run: pnpm test

      - name: Start PostgreSQL service
        if: matrix.db == 'pg'
        run: |
          docker run -d --name pg \
            -e POSTGRES_USER=ronzz \
            -e POSTGRES_PASSWORD=ronzz \
            -e POSTGRES_DB=ronzz \
            -p 5432:5432 \
            postgres:16-alpine
          # Wait for PG to be ready with retry loop
          for i in $(seq 1 10); do
            if pg_isready -h localhost -U ronzz -d ronzz 2>/dev/null; then
              echo "PostgreSQL is ready after ${i}s"
              break
            fi
            echo "Waiting for PostgreSQL... (${i}/10)"
            sleep 1
          done

      - name: Test with PostgreSQL
        if: matrix.db == 'pg'
        run: |
          DATABASE_URL=postgres://ronzz:ronzz@localhost:5432/ronzz pnpm --filter database db:migrate:pg
          DATABASE_URL=postgres://ronzz:ronzz@localhost:5432/ronzz pnpm --filter database db:seed
          DATABASE_URL=postgres://ronzz:ronzz@localhost:5432/ronzz pnpm test

      - name: Clean up PostgreSQL container
        if: matrix.db == 'pg' && always()
        run: docker rm -f pg 2>/dev/null || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ronzz/web build
